name: supportpoc-servicebus-emulator
services:
  emulator:
    container_name: servicebus-emulator
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - ./Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "SupportPoc_Emulator1!"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
    depends_on:
      - sqledge
    networks:
      sb-emulator:
        aliases:
          - sb-emulator
  sqledge:
    container_name: sqledge
    image: mcr.microsoft.com/azure-sql-edge:latest
    networks:
      sb-emulator:
        aliases:
          - sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SupportPoc_Emulator1!"

  sqlserver:
    container_name: supportpoc-sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SupportPoc_LocalSql1!"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      sb-emulator:

  ticket-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ticket-service
    container_name: supportpoc-ticket-service
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      AzureAd__Enabled: ${ENTRA_ENABLED:-false}
      AzureAd__TenantId: ${ENTRA_TENANT_ID:-}
      AzureAd__ClientId: ${ENTRA_API_CLIENT_ID:-}
      AzureAd__Audience: ${ENTRA_API_AUDIENCE:-}
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      emulator:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      sb-emulator:

  ai-orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-orchestrator
    container_name: supportpoc-ai-orchestrator
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      LocalMessaging__TicketServiceBaseUrl: http://ticket-service:8080
      Services__TicketService: http://ticket-service:8080
      AzureAd__Enabled: ${ENTRA_ENABLED:-false}
      AzureAd__TenantId: ${ENTRA_TENANT_ID:-}
      AzureAd__ClientId: ${ENTRA_API_CLIENT_ID:-}
      AzureAd__Audience: ${ENTRA_API_AUDIENCE:-}
      AzureAd__McpClientId: ${ENTRA_MCP_CLIENT_ID:-}
      AzureAd__McpClientSecret: ${ENTRA_MCP_CLIENT_SECRET:-}
    ports:
      - "5003:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      emulator:
        condition: service_started
      ticket-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      sb-emulator:

networks:
  sb-emulator:
