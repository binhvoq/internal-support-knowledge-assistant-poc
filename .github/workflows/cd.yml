name: CD

on:
  push:
    branches:
      - dev
      - test
      - main

permissions:
  contents: read
  id-token: write

env:
  TF_ROOT: infra/terraform
  TFSTATE_STORAGE: ${{ vars.AZURE_TFSTATE_STORAGE || 'stprojectthem5tfstate' }}
  TFSTATE_CONTAINER: tfstate
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve target environment
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            dev|test)
              target_env="${GITHUB_REF_NAME}"
              ;;
            main)
              target_env="prod"
              ;;
            *)
              echo "Unsupported branch ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          echo "TARGET_ENV=$target_env" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP_NAME=rg-internal-support-${target_env}" >> "$GITHUB_ENV"
          echo "ACR_NAME=support${target_env}01acr" >> "$GITHUB_ENV"
          echo "TFVARS_FILE=envs/${target_env}.tfvars" >> "$GITHUB_ENV"
          echo "BACKEND_KEY=${target_env}.terraform.tfstate" >> "$GITHUB_ENV"

      - name: Prepare Azure creds
        id: azure_creds
        shell: bash
        run: |
          set -euo pipefail
          json=$(cat <<EOF
          {"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}
          EOF
          )
          echo "creds=$json" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ steps.azure_creds.outputs.creds }}

      - name: Run deploy script
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python scripts/deploy_app.py
