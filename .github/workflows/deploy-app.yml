name: Deploy App

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      concurrency_name:
        required: true
        type: string
      resource_group_name:
        required: true
        type: string
      acr_name:
        required: true
        type: string
      tfvars_file:
        required: true
        type: string
      backend_key:
        required: true
        type: string
      base_sha:
        required: true
        type: string
      head_sha:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_ROOT: infra/terraform
  TFSTATE_STORAGE: ${{ vars.AZURE_TFSTATE_STORAGE || 'stprojectthem5tfstate' }}
  TFSTATE_CONTAINER: tfstate
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'southeastasia' }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    concurrency: ${{ inputs.concurrency_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve target environment
        shell: bash
        run: |
          echo "TARGET_ENV=${{ inputs.target_env }}" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP_NAME=${{ inputs.resource_group_name }}" >> "$GITHUB_ENV"
          echo "ACR_NAME=${{ inputs.acr_name }}" >> "$GITHUB_ENV"
          echo "TFVARS_FILE=${{ inputs.tfvars_file }}" >> "$GITHUB_ENV"
          echo "BACKEND_KEY=${{ inputs.backend_key }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ inputs.head_sha }}" >> "$GITHUB_ENV"

      - name: Prepare Azure creds
        id: azure_creds
        shell: bash
        run: |
          set -euo pipefail
          json=$(cat <<EOF
          {"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}
          EOF
          )
          echo "creds=$json" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ steps.azure_creds.outputs.creds }}

      - name: Terraform init
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail
          terraform init -reconfigure \
            -backend-config="storage_account_name=$TFSTATE_STORAGE" \
            -backend-config="container_name=$TFSTATE_CONTAINER" \
            -backend-config="key=$BACKEND_KEY" \
            -backend-config="use_azuread_auth=true"

      - name: Grant ACR push to pipeline identity
        shell: bash
        run: |
          set -euo pipefail
          acr_scope=$(az acr show --name "$ACR_NAME" --query id -o tsv)
          az role assignment create \
            --assignee "${{ vars.AZURE_CLIENT_ID }}" \
            --assignee-principal-type ServicePrincipal \
            --role "AcrPush" \
            --scope "$acr_scope" \
            -o none || true

      - name: Deploy app changes
        shell: bash
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          set -euo pipefail
          python scripts/deploy_app.py
