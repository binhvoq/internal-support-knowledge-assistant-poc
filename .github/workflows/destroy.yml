name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to destroy
        required: true
        type: environment
      confirm:
        description: Type the environment name again to confirm destroy
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_ROOT: infra/terraform
  TFSTATE_STORAGE: ${{ vars.AZURE_TFSTATE_STORAGE || 'stprojectthem5tfstate' }}
  TFSTATE_CONTAINER: tfstate
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require privileged actor for Destroy
        run: python scripts/check_cicd_governance.py authorize-pipeline --actor "${{ github.actor }}"

  destroy:
    needs: authorize
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency: destroy-${{ inputs.environment }}

    steps:
      - name: Confirm destroy target
        shell: bash
        run: |
          set -euo pipefail
          target="${{ inputs.environment }}"
          confirm="${{ inputs.confirm }}"
          if [ "$confirm" != "$target" ]; then
            echo "Confirmation mismatch: expected '$target', got '$confirm'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve target environment
        shell: bash
        run: |
          target_env="${{ inputs.environment }}"
          echo "TARGET_ENV=$target_env" >> "$GITHUB_ENV"
          echo "TFVARS_FILE=envs/${target_env}.tfvars" >> "$GITHUB_ENV"
          echo "BACKEND_KEY=${target_env}.terraform.tfstate" >> "$GITHUB_ENV"

      - name: Prepare Azure creds
        id: azure_creds
        shell: bash
        run: |
          set -euo pipefail
          json=$(cat <<EOF
          {"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}
          EOF
          )
          echo "creds=$json" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ steps.azure_creds.outputs.creds }}

      - name: Terraform init
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail
          terraform init -reconfigure \
            -backend-config="storage_account_name=$TFSTATE_STORAGE" \
            -backend-config="container_name=$TFSTATE_CONTAINER" \
            -backend-config="key=$BACKEND_KEY" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform destroy
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail
          terraform destroy \
            -auto-approve \
            -var-file="${TFVARS_FILE}"
